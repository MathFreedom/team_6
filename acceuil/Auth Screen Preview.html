<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<title>Nova — /auth preview</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    background: #f3f4f6;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 32px 16px;
  }
  #root { display: flex; align-items: center; justify-content: center; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel">
  const { useRouter } = { useRouter: () => ({ push: (p) => alert('router.push("' + p + '")') }) };

  function GoogleIcon({ className = '', style = {} }) {
    return (
      <svg className={className} style={style} viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path fill="#4285F4" d="M23.49 12.27c0-.79-.07-1.54-.19-2.27H12v4.51h6.44c-.28 1.48-1.12 2.73-2.39 3.58v2.96h3.86c2.26-2.08 3.58-5.15 3.58-8.78z"/>
        <path fill="#34A853" d="M12 24c3.24 0 5.95-1.08 7.93-2.91l-3.86-2.96c-1.07.72-2.45 1.16-4.07 1.16-3.13 0-5.78-2.11-6.73-4.96H1.29v3.07C3.26 21.3 7.31 24 12 24z"/>
        <path fill="#FBBC05" d="M5.27 14.33c-.24-.72-.38-1.49-.38-2.33s.14-1.61.38-2.33V6.6H1.29A11.97 11.97 0 000 12c0 1.94.46 3.78 1.29 5.4l3.98-3.07z"/>
        <path fill="#EA4335" d="M12 4.74c1.77 0 3.35.61 4.6 1.8l3.42-3.42C17.95 1.19 15.24 0 12 0 7.31 0 3.26 2.7 1.29 6.6l3.98 3.07C6.22 6.85 8.87 4.74 12 4.74z"/>
      </svg>
    );
  }

  function AuthPage() {
    const router = useRouter();
    return (
      <main style={{ minHeight: '100%', width: '100%', background: '#ffffff' }}>
        <div className="mx-auto flex w-full flex-col px-6" style={{ minHeight: '100%', maxWidth: 430 }}>

          {/* HEADER */}
          <header className="pt-12 pb-2 text-center">
            <h2 className="text-2xl font-semibold tracking-tight" style={{ color: '#1e40af' }}>Nova</h2>
          </header>

          {/* ZONE MASCOTTE + BULLE */}
          <section className="flex flex-col items-center justify-end pt-2" style={{ height: 280 }}>
            <div className="flex w-full items-center justify-center" style={{ height: 100 }}>
              {/* TODO: insérer ici le composant <MascotBubble /> avec le message
                  "Salut ! Je suis Nova, prêt à te faire économiser sur ta facture d'électricité ?" */}
            </div>
            <div className="flex items-center justify-center rounded-full bg-gray-100"
                 style={{ width: 140, height: 140 }}>
              <span className="text-xs font-medium tracking-widest text-gray-400">GECKO</span>
            </div>
          </section>

          {/* TITRE & SOUS-TITRE */}
          <section className="mt-8 flex flex-col items-center gap-3 text-center">
            <h1 className="text-3xl font-semibold tracking-tight" style={{ color: '#0a1628' }}>
              Économise sur ton électricité
            </h1>
            <p className="text-sm" style={{ color: '#5a6b80', maxWidth: 320, textWrap: 'pretty' }}>
              Connecte-toi en 2 minutes, je m'occupe du reste.
            </p>
          </section>

          {/* BLOC BOUTONS */}
          <section className="mt-auto flex flex-col gap-3 pt-10">
            <button
              onClick={() => router.push('/address')}
              className="w-full rounded-2xl text-base font-medium text-white transition-colors"
              style={{ height: 56, background: '#1e40af' }}
              onMouseEnter={(e) => (e.currentTarget.style.background = '#1e3a8a')}
              onMouseLeave={(e) => (e.currentTarget.style.background = '#1e40af')}
            >
              Créer un compte
            </button>

            <button
              onClick={() => router.push('/address?google=1')}
              className="flex w-full items-center justify-center gap-3 rounded-2xl bg-white text-base font-medium transition-colors"
              style={{
                height: 56,
                color: '#0a1628',
                border: '1px solid rgba(10, 22, 40, 0.08)',
                boxShadow: '0 1px 2px rgba(10, 22, 40, 0.04), 0 1px 3px rgba(10, 22, 40, 0.06)',
              }}
              onMouseEnter={(e) => (e.currentTarget.style.background = '#f9fafb')}
              onMouseLeave={(e) => (e.currentTarget.style.background = '#ffffff')}
            >
              <GoogleIcon style={{ width: 20, height: 20 }} />
              Continuer avec Google
            </button>
          </section>

          {/* LIEN BAS DE PAGE */}
          <footer className="pt-6 pb-10 text-center">
            <p className="text-sm" style={{ color: '#5a6b80' }}>
              Déjà inscrit ?{' '}
              <button
                type="button"
                onClick={() => router.push('/login')}
                className="font-medium hover:underline"
                style={{ color: '#1e40af', background: 'none', border: 'none', padding: 0, cursor: 'pointer', font: 'inherit' }}
              >
                Se connecter
              </button>
            </p>
          </footer>

        </div>
      </main>
    );
  }

  function App() {
    return (
      <IOSDevice width={402} height={874}>
        <AuthPage />
      </IOSDevice>
    );
  }

  // Wait for ios-frame.jsx to load
  const tryRender = () => {
    if (typeof IOSDevice === 'undefined') {
      setTimeout(tryRender, 50);
      return;
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  };
  tryRender();
</script>
</body>
</html>
